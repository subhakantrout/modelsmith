<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="feGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="beGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="connGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="18" fill="#e2e8f0" letter-spacing="1">ARCHITECTURE</text>

  <!-- Connection line between frontend and backend -->
  <line x1="370" y1="180" x2="530" y2="180" stroke="url(#connGrad)" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#glow)"/>
  <text x="450" y="165" text-anchor="middle" font-family="system-ui" font-weight="600" font-size="11" fill="#a78bfa">HTTP / WebSocket</text>
  <text x="450" y="195" text-anchor="middle" font-family="system-ui" font-weight="400" font-size="9" fill="#64748b">localhost:5173 ←→ localhost:8765</text>

  <!-- Arrow heads -->
  <polygon points="530,175 540,180 530,185" fill="#a78bfa"/>
  <polygon points="370,175 360,180 370,185" fill="#6366f1"/>

  <!-- Frontend section -->
  <rect x="30" y="60" width="340" height="300" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <rect x="30" y="60" width="340" height="32" rx="10" fill="url(#feGrad)"/>
  <rect x="30" y="82" width="340" height="10" fill="url(#feGrad)"/>
  <text x="200" y="81" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="13" fill="#e2e8f0">React Frontend (Vite)</text>

  <!-- Frontend components -->
  <rect x="50" y="110" width="145" height="65" rx="8" fill="url(#nodeGrad)" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
  <text x="122" y="135" text-anchor="middle" font-family="system-ui" font-weight="600" font-size="11" fill="#c4b5fd">Pipeline Canvas</text>
  <text x="122" y="150" text-anchor="middle" font-family="system-ui" font-weight="400" font-size="9" fill="#64748b">Nodes · Edges · Run</text>
  <circle cx="62" cy="120" r="4" fill="#6366f1"/>

  <rect x="215" y="110" width="135" height="65" rx="8" fill="url(#nodeGrad)" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
  <text x="282" y="135" text-anchor="middle" font-family="system-ui" font-weight="600" font-size="11" fill="#c4b5fd">Dashboard</text>
  <text x="282" y="150" text-anchor="middle" font-family="system-ui" font-weight="400" font-size="9" fill="#64748b">Radar · Heatmap · Registry</text>
  <circle cx="227" cy="120" r="4" fill="#6366f1"/>

  <rect x="50" y="195" width="145" height="65" rx="8" fill="url(#nodeGrad)" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
  <text x="122" y="220" text-anchor="middle" font-family="system-ui" font-weight="600" font-size="11" fill="#c4b5fd">Chat Panel</text>
  <text x="122" y="235" text-anchor="middle" font-family="system-ui" font-weight="400" font-size="9" fill="#64748b">Side-by-side comparison</text>
  <circle cx="62" cy="205" r="4" fill="#6366f1"/>

  <rect x="215" y="195" width="135" height="65" rx="8" fill="url(#nodeGrad)" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
  <text x="282" y="220" text-anchor="middle" font-family="system-ui" font-weight="600" font-size="11" fill="#c4b5fd">Config Panel</text>
  <text x="282" y="235" text-anchor="middle" font-family="system-ui" font-weight="400" font-size="9" fill="#64748b">Settings · Preferences</text>
  <circle cx="227" cy="205" r="4" fill="#6366f1"/>

  <!-- Frontend state layer -->
  <rect x="50" y="280" width="300" height="55" rx="8" fill="#334155" stroke="#475569" stroke-width="1" opacity="0.7"/>
  <text x="200" y="300" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="10" fill="#94a3b8">State Layer (Zustand)</text>
  <text x="200" y="318" text-anchor="middle" font-family="system-ui" font-weight="400" font-size="9" fill="#64748b">Pipeline Store · Model Store · UI Store</text>

  <!-- Backend section -->
  <rect x="530" y="60" width="340" height="300" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" opacity="0.8"/>
  <rect x="530" y="60" width="340" height="32" rx="10" fill="url(#beGrad)"/>
  <rect x="530" y="82" width="340" height="10" fill="url(#beGrad)"/>
  <text x="700" y="81" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="13" fill="#e2e8f0">Python FastAPI Backend</text>

  <!-- Backend Core Engine -->
  <rect x="550" y="110" width="300" height="175" rx="8" fill="#2e1065" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
  <text x="700" y="132" text-anchor="middle" font-family="system-ui" font-weight="600" font-size="11" fill="#d8b4fe">Core Engine</text>

  <!-- Engine components -->
  <rect x="565" y="145" width="90" height="28" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="0.5"/>
  <text x="610" y="163" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="9" fill="#c4b5fd">Model Manager</text>

  <rect x="670" y="145" width="90" height="28" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="0.5"/>
  <text x="715" y="163" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="9" fill="#c4b5fd">Abliterator</text>

  <rect x="775" y="145" width="60" height="28" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="0.5"/>
  <text x="805" y="163" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="9" fill="#c4b5fd">Merger</text>

  <rect x="565" y="185" width="90" height="28" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="0.5"/>
  <text x="610" y="203" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="9" fill="#c4b5fd">LoRA Engine</text>

  <rect x="670" y="185" width="90" height="28" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="0.5"/>
  <text x="715" y="203" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="9" fill="#c4b5fd">Compressor</text>

  <rect x="775" y="185" width="60" height="28" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="0.5"/>
  <text x="805" y="203" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="9" fill="#c4b5fd">Inference</text>

  <rect x="565" y="225" width="130" height="28" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="0.5"/>
  <text x="630" y="243" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="9" fill="#c4b5fd">Pipeline Advisor</text>

  <rect x="710" y="225" width="125" height="28" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="0.5"/>
  <text x="772" y="243" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="9" fill="#c4b5fd">Export Engine</text>

  <!-- API layer below engine -->
  <rect x="550" y="300" width="300" height="35" rx="8" fill="#334155" stroke="#475569" stroke-width="1" opacity="0.7"/>
  <text x="700" y="322" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="10" fill="#94a3b8">40+ REST API Endpoints · Pydantic Validation</text>

  <!-- Bottom legend -->

  <!-- Footer description -->
  <rect x="30" y="380" width="840" height="55" rx="8" fill="#1e293b" opacity="0.6"/>
  <text x="450" y="402" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="11" fill="#94a3b8">Users interact with the visual React frontend, which communicates with the Python backend over HTTP/WebSocket.</text>
  <text x="450" y="420" text-anchor="middle" font-family="system-ui" font-weight="400" font-size="10" fill="#64748b">The Core Engine runs all ML operations — loading, analyzing, ablating, merging, compressing — and streams results back to the UI.</text>
</svg>
